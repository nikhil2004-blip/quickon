widgets:

  # ── Dev Tools ─────────────────────────────────────────────────────────────
  - id: open-terminal
    label: "New Terminal"
    icon: "💻"
    color: "#0ea5e9"
    actions:
      - type: shell
        command: "start powershell"

  - id: open-vscode
    label: "VS Code"
    icon: "📝"
    color: "#0066b8"
    actions:
      - type: launch
        app: "code"
        args: ["."]

  - id: start-dev-environment
    label: "Dev Server"
    icon: "🚀"
    color: "#8b5cf6"
    actions:
      - type: browser
        url: "https://chatgpt.com"
      - type: browser
        url: "https://claude.ai"
      - type: delay
        ms: 800
      - type: launch
        app: "code"
        args: ["."]
      - type: shell
        command: "start powershell"

  # ── System ────────────────────────────────────────────────────────────────
  - id: lock-pc
    label: "Lock PC"
    icon: "🔒"
    color: "#ef4444"
    actions:
      - type: lock

  - id: show-desktop
    label: "Show Desktop"
    icon: "🖥️"
    color: "#10b981"
    actions:
      - type: keypress
        key: "win+d"

  - id: task-manager
    label: "Task Mgr"
    icon: "📊"
    color: "#f59e0b"
    actions:
      - type: keypress
        key: "ctrl+shift+esc"

  # ── Windows ───────────────────────────────────────────────────────────────
  - id: open-screenshot
    label: "Screenshot"
    icon: "📷"
    color: "#6366f1"
    actions:
      - type: keypress
        key: "win+shift+s"

  - id: volume-up
    label: "Vol +"
    icon: "🔊"
    color: "#22d3ee"
    actions:
      - type: keypress
        key: "volume_up"

  - id: volume-down
    label: "Vol -"
    icon: "🔉"
    color: "#22d3ee"
    actions:
      - type: keypress
        key: "volume_down"

  - id: mute
    label: "Mute"
    icon: "🔇"
    color: "#64748b"
    actions:
      - type: keypress
        key: "volume_mute"

  # ── Browser ───────────────────────────────────────────────────────────────
  - id: open-chatgpt
    label: "ChatGPT"
    icon: "🤖"
    color: "#10a37f"
    actions:
      - type: browser
        url: "https://chatgpt.com"

  - id: open-claude
    label: "Claude"
    icon: "✨"
    color: "#d97706"
    actions:
      - type: browser
        url: "https://claude.ai"
